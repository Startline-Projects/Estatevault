<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EstateVault — Testing Guide</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--navy:#1C3557;--gold:#C9A84C;--charcoal:#2D2D2D;--bg:#f7f8fa;--border:#e2e6ec;}
*{box-sizing:border-box;}
body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--charcoal);background:var(--bg);line-height:1.6;}
#layout{display:flex;max-width:1400px;margin:0 auto;}
#toc{position:sticky;top:0;align-self:flex-start;width:300px;height:100vh;overflow-y:auto;padding:24px 16px;background:var(--navy);color:#fff;flex-shrink:0;}
#toc h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin:0 0 12px;}
#toc a{display:block;color:#cdd6e4;text-decoration:none;font-size:13px;padding:5px 8px;border-radius:6px;border-left:2px solid transparent;}
#toc a:hover{background:rgba(255,255,255,.08);color:#fff;}
#toc a.h3{padding-left:20px;font-size:12px;color:#9fb0c8;}
#toc a.active{background:rgba(201,168,76,.18);border-left-color:var(--gold);color:#fff;}
#content{flex:1;min-width:0;padding:48px 56px;max-width:900px;}
#content h1{color:var(--navy);font-size:32px;border-bottom:3px solid var(--gold);padding-bottom:12px;margin-top:0;}
#content h2{color:var(--navy);font-size:24px;margin-top:48px;padding-top:12px;border-top:1px solid var(--border);}
#content h3{color:var(--navy);font-size:18px;margin-top:32px;}
#content h4{color:var(--charcoal);font-size:15px;}
#content a{color:var(--gold);}
#content code{background:#eef1f5;padding:2px 6px;border-radius:4px;font-size:13px;font-family:"SF Mono",Menlo,Consolas,monospace;color:#b5371f;}
#content pre{background:var(--navy);color:#e8edf4;padding:16px 20px;border-radius:10px;overflow-x:auto;font-size:13px;line-height:1.5;}
#content pre code{background:none;color:inherit;padding:0;}
#content table{border-collapse:collapse;width:100%;margin:16px 0;font-size:13.5px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
#content th{background:var(--navy);color:#fff;text-align:left;padding:10px 12px;font-weight:600;}
#content td{padding:9px 12px;border-top:1px solid var(--border);vertical-align:top;}
#content tr:nth-child(even) td{background:#fafbfc;}
#content blockquote{border-left:4px solid var(--gold);margin:16px 0;padding:8px 18px;background:#fffdf6;color:#5a5a5a;border-radius:0 8px 8px 0;}
#content hr{border:none;border-top:1px solid var(--border);margin:40px 0;}
#content input[type=checkbox]{accent-color:var(--gold);margin-right:6px;}
#content ul li::marker{color:var(--gold);}
@media(max-width:900px){#toc{display:none;}#content{padding:24px;}}
</style>
</head>
<body>
<div id="layout">
<nav id="toc"><h2>Contents</h2><div id="toc-list"></div></nav>
<main id="content"></main>
</div>

<script>
const md=decodeURIComponent(escape(atob(document.getElementById('md').textContent.trim())));
const c=document.getElementById('content');
c.innerHTML=marked.parse(md);
// build TOC + ids
const toc=document.getElementById('toc-list');
c.querySelectorAll('h2,h3').forEach((h,i)=>{
  const id='sec-'+i;h.id=id;
  const a=document.createElement('a');
  a.href='#'+id;a.textContent=h.textContent;
  if(h.tagName==='H3')a.className='h3';
  toc.appendChild(a);
});
// scrollspy
const links=[...toc.querySelectorAll('a')];
const heads=[...c.querySelectorAll('h2,h3')];
const obs=new IntersectionObserver(es=>{
  es.forEach(e=>{if(e.isIntersecting){
    const id=e.target.id;links.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+id));
  }});
},{rootMargin:'0px 0px -75% 0px'});
heads.forEach(h=>obs.observe(h));
</script>
</body>
